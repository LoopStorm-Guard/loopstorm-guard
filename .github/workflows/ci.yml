name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: every job gets only `contents: read` unless a
# job-level permissions block grants more. No job in this workflow needs
# write access to anything — CI is pure verification.
permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Bun version pinned here and in package.json packageManager field.
  BUN_VERSION: "1.2.5"
  # Rust toolchain — matches engine-build.yml.
  RUST_TOOLCHAIN: "stable"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: License header check (ADR-013)
  # Must run first — a wrong license is a legal issue, not a style issue.
  # Scans every .ts, .tsx, .py, .rs file and asserts correct SPDX header.
  # ─────────────────────────────────────────────────────────────────────────
  license-check:
    name: License Header Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check SPDX license headers
        run: |
          set -euo pipefail
          FAIL=0

          check_file() {
            local file="$1"
            local expected_spdx="$2"
            local ext="${file##*.}"

            # Determine comment prefix by extension
            case "$ext" in
              rs|ts|tsx)  prefix="//" ;;
              py)         prefix="#"  ;;
              *)          return 0    ;;
            esac

            local header="${prefix} SPDX-License-Identifier: ${expected_spdx}"

            # Read first non-empty line of file
            local first_line
            first_line=$(grep -m1 . "$file" || true)

            if [[ "$first_line" != "$header" ]]; then
              echo "MISSING OR WRONG SPDX HEADER: $file"
              echo "  Expected : $header"
              echo "  Got      : $first_line"
              FAIL=1
            fi
          }

          # MIT paths: apps/ (all sub-dirs) and packages/schemas/
          while IFS= read -r -d '' file; do
            check_file "$file" "MIT"
          done < <(find apps/ packages/schemas/ -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.py" -o -name "*.rs" \) -print0)

          # AGPL paths: packages/backend/ and packages/web/
          while IFS= read -r -d '' file; do
            check_file "$file" "AGPL-3.0-only"
          done < <(find packages/backend/ packages/web/ -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.py" -o -name "*.rs" \) -print0)

          if [[ $FAIL -ne 0 ]]; then
            echo ""
            echo "LICENSE HEADER CHECK FAILED."
            echo "Run scripts/add-license-headers.sh to fix missing headers."
            echo "See ADR-013 for the licensing boundary rules."
            exit 1
          fi

          echo "All SPDX headers OK."

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Policy schema hash assertion (ADR-003)
  # The SHA-256 of schemas/policy/policy.schema.json must match the hash
  # pinned in apps/engine/build.rs POLICY_SCHEMA_HASH constant.
  # ─────────────────────────────────────────────────────────────────────────
  schema-hash-check:
    name: Policy Schema Hash Assert
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assert policy schema hash matches build.rs pinned value
        run: |
          set -euo pipefail

          SCHEMA_FILE="schemas/policy/policy.schema.json"
          BUILD_RS="apps/engine/build.rs"

          # Compute actual SHA-256 of the schema file
          ACTUAL_HASH=$(sha256sum "$SCHEMA_FILE" | awk '{print $1}')

          # Extract pinned hash from build.rs — the line looks like:
          #   const POLICY_SCHEMA_HASH: &str = "abc123...";
          PINNED_HASH=$(grep 'POLICY_SCHEMA_HASH:' "$BUILD_RS" \
            | grep -oP '(?<=\")[0-9a-f]{64}(?=\")')

          if [[ -z "$PINNED_HASH" ]]; then
            echo "ERROR: Could not extract POLICY_SCHEMA_HASH from $BUILD_RS"
            exit 1
          fi

          echo "Schema file : $SCHEMA_FILE"
          echo "Actual hash : $ACTUAL_HASH"
          echo "Pinned hash : $PINNED_HASH"

          if [[ "$ACTUAL_HASH" != "$PINNED_HASH" ]]; then
            echo ""
            echo "SCHEMA HASH MISMATCH — policy schema has changed without"
            echo "updating the pinned hash in apps/engine/build.rs."
            echo ""
            echo "Follow ADR-003 schema change process:"
            echo "  1. Bump schema_version in $SCHEMA_FILE"
            echo "  2. Add backward-compat fixture test"
            echo "  3. Update POLICY_SCHEMA_HASH in $BUILD_RS to: $ACTUAL_HASH"
            echo "  4. Update all consumer PRs before merging"
            exit 1
          fi

          echo "Schema hash OK: $ACTUAL_HASH"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: TypeScript lint + typecheck
  # ─────────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun turbo run lint

      - name: Typecheck
        run: bun turbo run typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: TypeScript / Bun tests (backend + shim-ts)
  # Uses a Postgres service container for backend integration tests.
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: loopstorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loopstorm_test
      # Better Auth — test secret, not a real secret
      BETTER_AUTH_SECRET: ci-test-secret-not-real
      # Disable HTTP event sink — tests are air-gapped
      LOOPSTORM_DISABLE_HTTP_SINK: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply Drizzle migrations (required for RLS adversarial tests)
        # Run both migration files in order using psql directly.
        # The RLS migration uses FORCE ROW LEVEL SECURITY — with the postgres
        # superuser this is safe for testing. The DO blocks for
        # loopstorm_ingest and loopstorm_supervisor are no-ops because those
        # roles don't exist in the plain postgres image (blocks check pg_roles).
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          echo "Applying migration 0001_create_tables.sql..."
          psql -h localhost -U postgres -d loopstorm_test \
            -f packages/backend/drizzle/0001_create_tables.sql
          echo "Applying migration 0002_enable_rls.sql..."
          psql -h localhost -U postgres -d loopstorm_test \
            -f packages/backend/drizzle/0002_enable_rls.sql
          echo "Migrations applied."

      - name: Run backend tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loopstorm_test
        run: bun turbo run test --filter=@loopstorm/api

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Rust engine + CLI tests
  # ─────────────────────────────────────────────────────────────────────────
  test-engine:
    name: Rust Engine Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-10)
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ". -> target"

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests (workspace)
        # This also exercises build.rs — schema hash is asserted at compile time.
        run: cargo test --workspace

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6: Latency benchmark regression check
  # Runs benchmarks in --test mode (compile + execute, no timing comparison).
  # Full timing regression requires a stored baseline; flagged for Phase 2.
  # ─────────────────────────────────────────────────────────────────────────
  bench-engine:
    name: Engine Benchmark Compile Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-10)
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run benchmarks (compile + execute, --test mode)
        # --test mode runs each benchmark function once without timing.
        # This catches regressions that cause panics or compile errors.
        # TODO(platform-phase2): add benchmark baseline comparison with
        # bencher.dev or a stored criterion baseline artifact.
        run: cargo bench --bench enforcement_pipeline -- --test

  # ─────────────────────────────────────────────────────────────────────────
  # Job 7: Mode 0 smoke test
  # Builds the engine binary and verifies enforcement works with zero
  # network calls (LOOPSTORM_DISABLE_HTTP_SINK=1).
  # ─────────────────────────────────────────────────────────────────────────
  mode0-smoke:
    name: Mode 0 Smoke Test (Air-Gap)
    runs-on: ubuntu-22.04
    env:
      LOOPSTORM_DISABLE_HTTP_SINK: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-10)
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build engine and CLI binaries
        run: cargo build --release -p loopstorm-engine -p loopstorm-cli

      - name: Verify engine binary starts and prints schema hash
        run: |
          OUTPUT=$(./target/release/loopstorm-engine --version)
          echo "Engine output: $OUTPUT"
          # Verify the schema hash is embedded in the binary output
          if ! echo "$OUTPUT" | grep -q "10725f37ecb7e82d1073afdd154a4e4d42705c806b15ce6a3a381e53be1721bb"; then
            echo "ERROR: Engine binary did not embed expected policy schema hash"
            exit 1
          fi
          echo "Version check passed."

      - name: Full IPC round-trip smoke test
        run: |
          set -euo pipefail

          SOCKET="/tmp/loopstorm-smoke-$$.sock"
          AUDIT_LOG="/tmp/loopstorm-smoke-$$.jsonl"

          echo "--- Step 1: Start engine with test policy ---"
          ./target/release/loopstorm-engine \
            --policy examples/basic-policy.yaml \
            --socket "$SOCKET" \
            --audit-log "$AUDIT_LOG" \
            --log-level info \
            --force &
          ENGINE_PID=$!
          echo "Engine PID: $ENGINE_PID"

          # Wait for the socket to appear (up to 5 seconds).
          for i in $(seq 1 50); do
            if [ -S "$SOCKET" ]; then
              echo "Socket appeared after $((i * 100))ms"
              break
            fi
            sleep 0.1
          done
          if [ ! -S "$SOCKET" ]; then
            echo "ERROR: Socket did not appear at $SOCKET"
            kill "$ENGINE_PID" 2>/dev/null || true
            exit 1
          fi

          echo "--- Step 2: Send DecisionRequest over UDS ---"
          # Use Python to send NDJSON over the Unix domain socket.
          # file_read matches the *_read glob in basic-policy.yaml -> allow.
          RESPONSE=$(python3 -c "
          import socket, json, sys

          req = json.dumps({
              'schema_version': 1,
              'run_id': '01234567-89ab-cdef-0123-456789abcdef',
              'seq': 1,
              'tool': 'file_read',
              'args_hash': '0' * 64,
              'ts': '2026-03-23T00:00:00Z'
          })

          sock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          sock.settimeout(10)
          sock.connect('$SOCKET')
          sock.sendall((req + '\n').encode())

          # Read response line (up to 64 KiB).
          buf = b''
          while b'\n' not in buf:
              chunk = sock.recv(65536)
              if not chunk:
                  break
              buf += chunk
          sock.close()

          resp = json.loads(buf.decode().strip())
          print(json.dumps(resp))
          ")

          echo "Response: $RESPONSE"

          echo "--- Step 3: Assert DecisionResponse is valid ---"
          DECISION=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['decision'])")
          echo "Decision: $DECISION"
          if [ "$DECISION" != "allow" ]; then
            echo "ERROR: Expected decision 'allow' for file_read, got '$DECISION'"
            kill "$ENGINE_PID" 2>/dev/null || true
            exit 1
          fi
          echo "Decision assertion passed: file_read -> allow"

          echo "--- Step 4: Graceful shutdown (SIGTERM) ---"
          kill -TERM "$ENGINE_PID"
          # Wait for engine to exit (up to 10 seconds).
          for i in $(seq 1 100); do
            if ! kill -0 "$ENGINE_PID" 2>/dev/null; then
              echo "Engine exited after $((i * 100))ms"
              break
            fi
            sleep 0.1
          done
          if kill -0 "$ENGINE_PID" 2>/dev/null; then
            echo "WARNING: Engine did not exit gracefully, sending SIGKILL"
            kill -9 "$ENGINE_PID" 2>/dev/null || true
          fi

          echo "--- Step 5: Assert JSONL audit log exists and has content ---"
          if [ ! -f "$AUDIT_LOG" ]; then
            echo "ERROR: Audit log not found at $AUDIT_LOG"
            exit 1
          fi
          LINE_COUNT=$(wc -l < "$AUDIT_LOG")
          echo "Audit log has $LINE_COUNT lines"
          if [ "$LINE_COUNT" -lt 1 ]; then
            echo "ERROR: Audit log is empty"
            exit 1
          fi
          echo "Audit log assertion passed."

          echo "--- Step 6: Verify hash chain with CLI ---"
          ./target/release/loopstorm verify "$AUDIT_LOG"
          echo "Hash chain verification passed."

          echo "--- Cleanup ---"
          rm -f "$SOCKET" "$AUDIT_LOG"
          echo "Mode 0 full IPC smoke test PASSED."

  # ─────────────────────────────────────────────────────────────────────────
  # Job: OTel Exporter Tests
  # Runs bun test in apps/otel-exporter/. No external services required —
  # all tests use InMemorySpanExporter and tmp files.
  # ─────────────────────────────────────────────────────────────────────────
  test-otel-exporter:
    name: OTel Exporter Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run OTel exporter tests
        run: bun test
        working-directory: apps/otel-exporter

  # ─────────────────────────────────────────────────────────────────────────
  # Job 7b: Supervisor tests (v1.1 AI Supervisor)
  # No ANTHROPIC_API_KEY required — all tests use MockLLMProvider.
  # ─────────────────────────────────────────────────────────────────────────
  test-supervisor:
    name: Supervisor Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run supervisor tests
        run: bun test
        working-directory: apps/supervisor

  # ─────────────────────────────────────────────────────────────────────────
  # Job 8: TypeScript build (all packages)
  # ─────────────────────────────────────────────────────────────────────────
  build-ts:
    name: TypeScript Build
    runs-on: ubuntu-22.04
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all TypeScript packages
        run: bun turbo run build

  # ─────────────────────────────────────────────────────────────────────────
  # Job: Playwright E2E Tests
  #
  # Full-stack orchestration:
  #   1. PostgreSQL service container (same postgres:15 image as test-backend)
  #   2. Drizzle migrations applied via drizzle-kit
  #   3. Hono backend started as a background process (packages/backend)
  #   4. Next.js dev server started as a background process (packages/web)
  #   5. global-setup.ts polls both servers until healthy
  #   6. Playwright Chromium runs all non-skipped tests
  #
  # Currently-active tests (not test.skip):
  #   auth.spec.ts    — page renders, unauthenticated redirects, invalid-creds error
  #   runs.spec.ts    — unauthenticated redirect
  #   api-keys.spec.ts — unauthenticated redirect
  #   policies.spec.ts — unauthenticated redirect
  #   supervisor.spec.ts — unauthenticated redirect
  #
  # Skipped tests (require seeded authenticated sessions):
  #   All test.skip blocks — enabled in a later iteration when a test-user
  #   seeding strategy is added (see post-v1 backlog item S1).
  #
  # Artifacts: screenshots + Playwright traces are uploaded on failure.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-22.04
    # Depend on build-ts so Next.js is fully built before we start servers.
    # Also wait for test-backend so we know migrations are valid SQL before
    # applying them in this job.
    needs: [build-ts, test-backend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: loopstorm_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
    env:
      # ── Database ───────────────────────────────────────────────────────────
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loopstorm_e2e
      # ── Better Auth (ADR-011) ─────────────────────────────────────────────
      # BETTER_AUTH_SECRET must be ≥ 32 characters (validated in env.ts).
      BETTER_AUTH_SECRET: "ci-e2e-secret-not-real-32-chars-pad"
      # BETTER_AUTH_URL is the backend's own base URL — used in email links
      # and as the issuer for session tokens. Port 3001 is the Bun server.
      BETTER_AUTH_URL: "http://localhost:3001"
      # ── Supabase (CI: not used for Storage/Realtime in E2E) ───────────────
      # A placeholder is required because env.ts validates it as non-empty.
      # E2E tests do not exercise Supabase Storage or Realtime paths.
      SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-service-role-key"
      # ── Backend server settings ───────────────────────────────────────────
      PORT: "3001"
      NODE_ENV: "test"
      # Allow CORS from the Next.js dev server
      ALLOWED_ORIGINS: "http://localhost:3000"
      # ── Disable HTTP event sink — no engine running in E2E ────────────────
      LOOPSTORM_DISABLE_HTTP_SINK: "1"
      # ── Next.js: do NOT set NEXT_PUBLIC_API_URL so rewrites are used ──────
      # The Next.js next.config.ts rewrites /api/auth/** and /api/trpc/**
      # to http://localhost:3001 when NEXT_PUBLIC_API_URL is unset.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply Drizzle migrations
        # Run both migration files in order. We run them directly with psql
        # rather than via drizzle-kit migrate to avoid drizzle-kit writing a
        # journal file on the ephemeral CI filesystem (which would fail on
        # subsequent runs that expect a clean state).
        # The RLS migration uses FORCE ROW LEVEL SECURITY — in CI with the
        # postgres superuser this is safe. The DO blocks for loopstorm_ingest
        # and loopstorm_supervisor are no-ops because those roles don't exist
        # in the plain postgres image (the blocks check pg_roles first).
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          echo "Applying migration 0001_create_tables.sql..."
          psql -h localhost -U postgres -d loopstorm_e2e \
            -f packages/backend/drizzle/0001_create_tables.sql
          echo "Applying migration 0002_enable_rls.sql..."
          psql -h localhost -U postgres -d loopstorm_e2e \
            -f packages/backend/drizzle/0002_enable_rls.sql
          echo "Migrations applied."

      - name: Start backend server (background)
        # Start the Hono API server. Redirect stdout/stderr to a log file so
        # we can upload it on failure without polluting the runner output.
        # The global-setup.ts healthcheck will wait for the server to be ready.
        run: |
          mkdir -p /tmp/loopstorm-e2e-logs
          nohup bun run packages/backend/src/index.ts \
            > /tmp/loopstorm-e2e-logs/backend.log 2>&1 &
          echo "Backend PID: $!"
          echo $! > /tmp/loopstorm-e2e-logs/backend.pid

      - name: Start Next.js dev server (background)
        # Use `next dev` (not `next start`) so no build step is required here.
        # build-ts already verified the build compiles; dev mode starts faster.
        # next dev watches for changes but that's fine in a read-only CI env.
        #
        # Step-level PORT override: the job-level env sets PORT=3001 for the
        # backend. Next.js 16.x respects the PORT env var, so without this
        # override it would race the backend for port 3001. Explicitly set
        # PORT=3000 here so Next.js always binds on 3000 as expected by
        # global-setup.ts and the Playwright baseURL config.
        env:
          PORT: "3000"
        run: |
          nohup bun run --cwd packages/web dev \
            > /tmp/loopstorm-e2e-logs/nextjs.log 2>&1 &
          echo "Next.js PID: $!"
          echo $! > /tmp/loopstorm-e2e-logs/nextjs.pid

      - name: Install Playwright browsers (Chromium only)
        # Only install Chromium — the playwright.config.ts projects array only
        # contains the "chromium" project. --with-deps installs OS dependencies
        # (fonts, nss, etc.) that Chromium needs on ubuntu-22.04.
        run: bunx playwright install chromium --with-deps
        working-directory: packages/web

      - name: Run Playwright E2E tests
        # global-setup.ts will poll localhost:3001/api/health and localhost:3000
        # until both are ready (up to 60s each), then verify the DB is healthy
        # before Playwright dispatches any tests.
        run: bunx playwright test
        working-directory: packages/web

      - name: Upload Playwright test report
        # Always upload the HTML report so failures are diagnosable regardless
        # of whether an artifact already exists from a previous attempt.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright failure artifacts (screenshots + traces)
        # Screenshots and traces are only written on failure (configured in
        # playwright.config.ts: screenshot: "only-on-failure", trace: "on-first-retry").
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-failure-artifacts
          path: packages/web/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload server logs on failure
        # Backend and Next.js logs are invaluable for diagnosing E2E failures
        # that are caused by server errors rather than frontend issues.
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-server-logs
          path: /tmp/loopstorm-e2e-logs/
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Job 9: Rust dependency license audit (cargo-deny)
  # Ensures no GPL-incompatible dependency exists in MIT-licensed Rust crates.
  # ─────────────────────────────────────────────────────────────────────────
  license-audit-rust:
    name: Rust Dep License Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        run: |
          curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.16.3/cargo-deny-0.16.3-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin cargo-deny-0.16.3-x86_64-unknown-linux-musl/cargo-deny

      - name: Run cargo-deny license check
        run: cargo-deny check licenses

      - name: Run cargo-deny advisories check (non-blocking)
        continue-on-error: true
        run: cargo-deny check advisories || echo "::warning::cargo-deny advisories check failed (may be upstream CVSS parsing issue)"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 10: JS/TS dependency license audit
  # Ensures no GPL-incompatible dependency exists in MIT-licensed TS packages.
  # ─────────────────────────────────────────────────────────────────────────
  license-audit-js:
    name: JS Dep License Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run JS license check
        run: bash scripts/check-js-licenses.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Job 11: AGPL/MIT import boundary (ADR-013)
  # Verifies MIT packages never import from AGPL packages.
  # ─────────────────────────────────────────────────────────────────────────
  license-boundary:
    name: AGPL/MIT Boundary Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check AGPL/MIT import boundary
        run: bash scripts/check-license-boundary.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Job 12: Schema path sync check
  # Verifies schemas/ (canonical) matches packages/schemas/ (TS copy).
  # ─────────────────────────────────────────────────────────────────────────
  schema-sync:
    name: Schema Path Sync Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify schema files in sync
        run: bash scripts/sync-schemas.sh --check

  # ─────────────────────────────────────────────────────────────────────────
  # Job 13: Secret scanning (gitleaks)
  # Scans for accidentally committed secrets, API keys, and credentials.
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  # ─────────────────────────────────────────────────────────────────────────
  # CI gate — all required jobs must pass for merge to be allowed.
  # Add this job as the required status check in branch protection.
  # ─────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-22.04
    needs:
      - license-check
      - schema-hash-check
      - lint-typecheck
      - test-backend
      - test-engine
      - bench-engine
      - mode0-smoke
      - test-otel-exporter
      - test-supervisor
      - build-ts
      - license-audit-rust
      - license-audit-js
      - license-boundary
      - schema-sync
      - secret-scan
      - e2e
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED jobs:', failed)
              sys.exit(1)
          print('All CI jobs passed.')
          "
