# SPDX-License-Identifier: MIT
#
# Deploy workflow for LoopStorm Guard.
#
# Triggers on version tags (v*) only — NOT on every push to main.
# Requires the following repository secrets to be configured:
#   - DATABASE_URL            (Supabase PostgreSQL connection string)
#   - CLOUDFLARE_API_TOKEN    (Workers deploy token)
#   - CLOUDFLARE_ACCOUNT_ID   (Cloudflare account ID)
#   - NEXT_PUBLIC_API_URL     (Backend API URL for the frontend)
#   - VERCEL_TOKEN            (Vercel deploy token)
#   - VERCEL_ORG_ID           (Vercel organization ID)
#   - VERCEL_PROJECT_ID       (Vercel project ID)
#
# To deploy manually, push a tag: git tag v1.0.0 && git push origin v1.0.0
# Or use workflow_dispatch from the Actions tab.
name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations (drizzle-kit migrate)
        run: bun run --cwd packages/backend drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Typecheck backend
        run: bun turbo typecheck --filter=@loopstorm/backend

      - name: Deploy to Cloudflare Workers
        run: bun run --cwd packages/backend deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun turbo build --filter=@loopstorm/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel
        run: bunx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
