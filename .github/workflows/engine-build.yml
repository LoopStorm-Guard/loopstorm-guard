# SPDX-License-Identifier: MIT
name: Engine Cross-Compile

on:
  push:
    branches: [main]
    paths:
      - 'apps/engine/**'
      - 'apps/cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'apps/engine/**'
      - 'apps/cli/**'

# Least-privilege default: this workflow only builds and uploads artifacts,
# never mutates repo state or touches the release UI.
permissions:
  contents: read

jobs:
  cross-compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: loopstorm-engine-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: loopstorm-engine-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: loopstorm-engine-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: loopstorm-engine-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: loopstorm-engine-windows-x86_64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-10)
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build engine (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p loopstorm-engine

      - name: Build engine (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p loopstorm-engine

      - name: Build CLI (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p loopstorm-cli

      - name: Build CLI (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p loopstorm-cli

      - name: Upload engine artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/loopstorm-engine*
            target/${{ matrix.target }}/release/loopstorm-cli*
          retention-days: 30
