# SPDX-License-Identifier: MIT
name: Engine Cross-Compile

on:
  push:
    branches: [main]
    paths:
      - 'apps/engine/**'
      - 'apps/cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'apps/engine/**'
      - 'apps/cli/**'

jobs:
  cross-compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: loopstorm-engine-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: loopstorm-engine-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: loopstorm-engine-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: loopstorm-engine-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: loopstorm-engine-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build engine (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p loopstorm-engine

      - name: Build engine (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p loopstorm-engine

      - name: Build CLI (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p loopstorm-cli

      - name: Build CLI (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p loopstorm-cli

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/loopstorm-engine*
            target/${{ matrix.target }}/release/loopstorm-cli*
          retention-days: 30
