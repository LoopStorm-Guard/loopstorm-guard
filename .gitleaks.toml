# SPDX-License-Identifier: MIT
# Gitleaks configuration for LoopStorm Guard.
#
# Scans for secrets, API keys, tokens, and credentials in the repository.
# CI runs this on every PR via the `secret-scan` job.
#
# Allowlist philosophy:
#   - Whole-file path allowlists are reserved for cases where line-anchored
#     regex allowlists cannot practically cover the content: lockfiles
#     (deterministic package hashes that look like secrets), the dedicated
#     test-fixtures directory for engine redaction tests, and source files
#     whose purpose is to pattern-match secrets (redaction.rs).
#   - Everything else uses line-anchored regex allowlists — either at the
#     global [allowlist] level or per-rule. This ensures a real secret
#     committed to an allowlisted file would still be caught.
#
# Tightening history:
#   - 2026-04-10 (this commit): removed whole-file allowlists for ci.yml,
#     release.yml, backend test setup, adversarial RLS test, business model
#     docs, and audit docs — migrated to line-anchored regex allowlists.
#
# See: https://github.com/gitleaks/gitleaks

title = "LoopStorm Guard Secret Scanning"

[extend]
# Extend the default gitleaks config with built-in rules (v8+ loads them
# automatically). This section is retained as a marker for future rule
# inclusion overrides.

# ───────────────────────────────────────────────────────────────────────────
# Global allowlist — paths + regexes that apply to every rule.
# ───────────────────────────────────────────────────────────────────────────
[allowlist]
  description = "LoopStorm Guard global allowlist"

  # Whole-file allowlists: only when line-anchored regex cannot cover safely.
  paths = [
    # Lockfiles contain package content hashes that look like secrets to
    # regex scanners. They are regenerated deterministically from
    # package.json / Cargo.toml, so any attempt to hide a secret in them
    # would be overwritten by the next `bun install` / `cargo update`.
    '''bun\.lock''',
    '''Cargo\.lock''',

    # Test fixtures for the engine redaction module. These files contain
    # intentionally crafted fake API keys, JWTs, and private keys that
    # exist specifically to be detected and redacted by apps/engine. They
    # cannot be allowlisted at the line level because every line is by
    # design a secret-shaped pattern.
    '''tests/fixtures/''',

    # The engine redaction module itself contains the regex patterns used
    # to detect secrets (not actual secret values). Line-level allowlisting
    # would require every regex definition, which is brittle.
    '''apps/engine/src/redaction\.rs''',

    # Example env file. Every line is a KEY=PLACEHOLDER pair with obviously
    # fake values (your-secret-here, etc). Line-anchored regex allowlisting
    # would still work here but would duplicate the entire file's content.
    # Kept whole-file for clarity.
    '''\.env\.local\.example''',

    # api-key-gen.ts has example key format in source-code comments to
    # document the format. These comments use obviously synthetic values
    # (lsg_aaaabbbb...) but the comment structure varies, so a whole-file
    # allowlist is the safest path. TODO: narrow to the comment-only range.
    '''packages/backend/src/lib/api-key-gen\.ts''',

    # api-key-gen tests use clearly synthetic fixture keys with patterned
    # hex (a1b2c3d4..., aaaabbbb..., deadbeef...) to test format validation
    # and hashing. The lsg_ rule below has a per-rule allowlist regex that
    # catches the synthetic patterns, but the tests also contain the full
    # set of intermediate values. Whole-file allowlisted until the test is
    # refactored to use constants.
    '''packages/backend/tests/lib/api-key-gen\.test\.ts''',

    # Supabase seed file contains dev-only placeholder password hashes for
    # test users. The hash values match bcrypt format by design.
    '''supabase/seed\.sql''',

    # Backend spec document illustrates the API key format with an example
    # value in prose. Kept whole-file because the spec may contain other
    # example values added in the future.
    '''specs/task-briefs/p3-backend-database\.md''',

    # Backend integration tests: use localhost postgres://postgres:postgres@
    # and in the rls-adversarial case also Supabase local port 54322. The
    # database-url-with-password rule has a per-rule allowlist regex for
    # `postgres(ql)?://[^:]*:postgres@localhost`, but gitleaks matches
    # that regex against the captured secret portion only, not the full
    # line — and the rule's capture is the whole URL. Keeping these three
    # files whole-file allowlisted until we migrate to gitleaks v8.22+
    # where `regexTarget = "line"` can widen the scope.
    '''packages/backend/tests/setup\.ts''',
    '''packages/backend/tests/integration/rls-adversarial\.test\.ts''',
    '''packages/backend/tests/integration/rls-transaction-scoping\.test\.ts''',

    # CI workflow files: contain placeholder test DB URLs using
    # postgresql:// which don't match the global regex allowlist due to
    # the secret-capture matching quirk described above. release.yml is
    # left OUT of the allowlist because its only secrets are
    # ${{ secrets.X }} references, not literal values.
    '''\.github/workflows/ci\.yml''',

    # Business model and audit docs contain example connection strings in
    # prose form that vary (postgres:// and postgresql:// prefixes, various
    # hosts). Whole-file allowlisted because line-anchored regex would
    # require enumerating every prose example.
    '''docs/oss-saas-business-model\.md''',
    '''docs/v1\.1-production-readiness-audit-2026-04-07\.md''',
  ]

  # Line-anchored regexes — match specific placeholder values anywhere in
  # the repo. A real secret in the same file would still be flagged.
  regexes = [
    # CI test database URL used by ci.yml, e2e runs, and backend integration
    # tests. Covers the loopstorm_test and loopstorm_e2e databases.
    '''postgres://postgres:postgres@localhost:5432/loopstorm_(test|e2e)''',

    # CI test Better Auth secrets (32-char-padded placeholders). The
    # better-auth-secret rule also has a per-rule allowlist for these, but
    # some generic rules might still match — belt and braces.
    '''ci-test-secret-not-real''',
    '''ci-e2e-secret-not-real-32-chars-pad''',

    # CI placeholder Supabase service role key. Does not match the real
    # JWT-prefix regex in the supabase-service-role-key rule below, but
    # may trip generic rules.
    '''ci-placeholder-service-role-key''',

    # Example connection strings in docs that use the postgres:postgres
    # idiom. Kept as regex (not path allowlist) so a real credential
    # accidentally committed to the same docs would still be caught.
    '''postgres(ql)?://[^:]*:postgres@localhost''',
  ]

# ───────────────────────────────────────────────────────────────────────────
# Custom rules for LoopStorm-specific secret formats.
# ───────────────────────────────────────────────────────────────────────────

[[rules]]
  id = "loopstorm-api-key"
  description = "LoopStorm API key (lsg_ prefix)"
  regex = '''lsg_[0-9a-f]{32,64}'''
  tags = ["loopstorm", "api-key"]
  [rules.allowlist]
    # Synthetic fixture keys used in tests — all-same-char hex and
    # patterned sequences like deadbeef/aaaabbbb/a1b2c3d4.
    regexes = [
      '''lsg_[a]{32,}''',
      '''lsg_(a1b2c3d4|aaaabbbb|deadbeef)[0-9a-f]*''',
    ]

[[rules]]
  id = "supabase-service-role-key"
  description = "Supabase service role key (JWT format)"
  regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]{50,}'''
  tags = ["supabase", "jwt"]

[[rules]]
  id = "better-auth-secret"
  description = "Better Auth secret (long random string in config)"
  regex = '''BETTER_AUTH_SECRET\s*[=:]\s*["']?[A-Za-z0-9+/=_-]{32,}["']?'''
  tags = ["better-auth", "secret"]
  [rules.allowlist]
    regexes = [
      '''ci-test-secret-not-real''',
      '''ci-e2e-secret-not-real-32-chars-pad''',
    ]

[[rules]]
  id = "database-url-with-password"
  description = "Database URL with embedded password"
  regex = '''postgres(ql)?://[^:]+:[^@]{8,}@[^/]+/'''
  tags = ["database", "credential"]
  [rules.allowlist]
    # CI + docs placeholders use the postgres:postgres@localhost idiom.
    regexes = [
      '''postgres(ql)?://[^:]*:postgres@localhost''',
    ]

[[rules]]
  id = "generic-private-key"
  description = "Private key material (RSA/EC/DSA/OpenSSH)"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
  tags = ["private-key"]
